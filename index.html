<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ski Tracker Pro</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <!-- Leaflet for map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Chart.js for speed graph -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">
</head>
<body>

<div class="container">
  <h1>🏔️ Ski Tracker Pro</h1>

  <!-- Auth -->
  <div id="auth" class="card">
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>

  <!-- App -->
  <div id="app" class="hidden card">
    <button onclick="logout()">Logout</button>

    <h3>Runs: <span id="runs">0</span></h3>
    <button onclick="addRun()">+ Run</button>

    <hr>

    <h3>📊 Speed Graph</h3>
    <canvas id="speedChart"></canvas>

    <hr>

    <h3>🗺️ Route Tracking</h3>
    <button onclick="startTracking()">Start Ski</button>
    <div id="map"></div>

    <p id="location">Nearest resort will appear here</p>

    <hr>

    <h3>🏆 Leaderboard</h3>
    <ul id="leaderboard"></ul>
  </div>
</div>

<!-- App JS -->
<script src="app.js"></script>

</body>
</html>
