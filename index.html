<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ski Tracker Pro</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
  <header>
    <h1>🏔️ Ski Tracker Pro</h1>
    <p>Track runs, speed & nearest ski resorts</p>
  </header>

  <!-- LOGIN / SIGNUP -->
  <div id="auth" class="card auth-card">
    <h2>Login / Sign Up</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <div class="button-group">
      <button onclick="signup()">Sign Up</button>
      <button onclick="login()">Login</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="app" class="hidden">
    <div class="card dashboard-card">
      <div class="dashboard-header">
        <h2 id="userLabel">User</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat-card">
          <h3>Runs</h3>
          <p id="runs">0</p>
          <button onclick="addRun()">+ Add Run</button>
        </div>
      </div>

      <!-- Speed Graph -->
      <div class="section">
        <h3>📊 Speed Graph</h3>
        <canvas id="speedChart"></canvas>
      </div>

      <!-- Map & Tracking -->
      <div class="section">
        <h3>🗺️ Ski Map</h3>
        <button class="start-btn" onclick="startTracking()">Start Ski</button>
        <div id="map"></div>
        <p id="location">Nearest resort will appear here</p>
      </div>

      <!-- Leaderboard -->
      <div class="section">
        <h3>🏆 Leaderboard</h3>
        <ul id="leaderboard"></ul>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
